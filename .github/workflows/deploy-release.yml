name: Build & Release JRealm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: JRealm v${{ steps.version.outputs.version }}
          body: |
            ## JRealm v${{ steps.version.outputs.version }}

            Built from commit ${{ github.sha }}.
          draft: false
          prerelease: false
          files: target/jrealm.jar
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Log in to Docker Hub
        run: |
          cat ~/.docker/config.json || true
          docker logout || true
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          cat ~/.docker/config.json

      - name: Build and push Docker image
        run: |
          docker build -t substratecore/jrealm:${{ steps.version.outputs.version }} \
                       -t substratecore/jrealm:latest .
          docker push substratecore/jrealm:${{ steps.version.outputs.version }}
          docker push substratecore/jrealm:latest

      - name: Deploy to GCN
        run: |
          RESPONSE=$(curl -sf -X POST https://api.substratecore.com/api/k8s/deploy/configs/cdc-2d4e4ce2-e3f/deploy \
            -H "Authorization: Bearer ${{ secrets.GCN_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "clusterIdentifier": "bd809b28-0f3c-42fc-9323-3c9f8411791e",
              "overrides": {
                "IMAGE": "substratecore/jrealm:${{ steps.version.outputs.version }}"
              }
            }')
          echo "Deploy response: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | jq -r '.data.status')
          if [ "$STATUS" != "DEPLOYED" ]; then
            echo "Deployment failed with status: $STATUS"
            exit 1
          fi
          echo "Successfully deployed substratecore/jrealm:${{ steps.version.outputs.version }}"
